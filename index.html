<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Painter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Pixel Painter</h1>
        <p>Create pixel art anywhere — desktop or mobile.</p>

        <div class="toolbar">
            <input type="color" id="colorPicker" value="#3b82f6">
            <!-- New Brush Size Dropdown Selection Selector -->
            <select id="brushSize" style="padding: 12px; border-radius: 10px; border: none; font-size: 15px; cursor: pointer;">
                <option value="1">Size: 1px</option>
                <option value="2">Size: 2px</option>
                <option value="3">Size: 3px</option>
                <option value="4">Size: 4px</option>
            </select>
            
            <button id="brushBtn">Brush</button>
            <button id="eraserBtn">Eraser</button>
            <button id="clearBtn">Clear</button>
            <button id="saveBtn">Save</button>
        </div>

        <!-- Replaced div with a real responsive canvas element -->
        <canvas id="paintCanvas" width="1024" height="1024"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
